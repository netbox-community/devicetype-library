---
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        name: Check YAML files
  - repo: https://github.com/jumanjihouse/pre-commit-hook-yamlfmt
    rev: 0.2.3
    hooks:
      - id: yamlfmt
        args: [--mapping, '2', --sequence, '4', --offset, '2']
  - repo: https://github.com/adrienverge/yamllint.git
    rev: v1.35.1
    hooks:
      - id: yamllint
        name: Lint YAML files
        args: [--format, parsable, --strict]
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.23.1
    hooks:
      - id: markdownlint-cli2
  - repo: local
    hooks:
      - id: pytest
        name: Run PyTest Case Checks
        entry: python -m pytest
        language: system
        # Collection is intentionally pinned to the known test module for security:
        # bare `pytest` would collect/execute any test_*.py a PR adds (even under tests/).
        # Adding a new test module requires updating this invocation.
        args: [tests/definitions_test.py, --tb=short, -v]
        pass_filenames: false
        always_run: true
