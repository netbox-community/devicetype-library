[pytest]
# --noconftest: the suite uses no conftest.py; disabling conftest loading stops a PR-added
# tests/conftest.py from executing at collection time (confcutdir only limited the upward
# search). Remove this only if a legitimate conftest.py is ever added (and re-harden then).
addopts = --import-mode=importlib --noconftest
testpaths = tests
