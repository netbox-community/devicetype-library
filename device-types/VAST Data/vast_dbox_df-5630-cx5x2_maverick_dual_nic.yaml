---
# NetBox Device Type Definition
# VAST Data DBox DF-5630-CX5X2 (Mavericks Dual NIC)
# Source: DBox DF-56xx Mavericks Single/Dual NIC Datasheet

manufacturer: VAST Data
model: DBox DF-5630-CX5X2
slug: vast-dbox-df-5630-cx5x2
part_number: DF-5630-CX5X2
u_height: 2
is_full_depth: true
subdevice_role: parent

# To add images: upload via NetBox UI > Device Types > Images
# Suggested filenames:
#   front_image: vast_dbox_maverick_front.png
#   rear_image:  vast_dbox_maverick_rear.png

comments: |
  VAST Data DBox DF-5630-CX5X2 (Mavericks) — Dual NIC Configuration.
  2U storage chassis hosting 2x Active/Active Fabric Modules (DNodes).
  Persistent Memory: 18TB | HyperScale Flash: 1329TB.
  Per node: Dual Intel Xeon E5-2630 v4, 64GB DDR4.
  Dual NIC: MCX555A-ECAT (CX5 Single Port) + MCX545B-ECAN (CX5 OCP).

# ------------------------------------------------------------
# Interfaces — Per Chassis (2 DNodes, Dual NIC per node)
# Each DNode has:
#   - 1x MCX555A-ECAT (CX5 Single Port) = 1x 100GbE/EDR IB
#   - 1x MCX545B-ECAN (CX5 OCP)        = 1x 100GbE/EDR IB
#   - 2x optional 1GbE management
# Total per chassis: 4x data + 4x mgmt
# ------------------------------------------------------------
interfaces:
  # --- DNode 0 ---
  - name: "dnode0-data0"
    type: "100gbase-x-qsfp28"
    label: "DNode 0 – Data Port 0 (MCX555A-ECAT)"
    description: "CX5 Single Port NIC (100GbE or EDR IB)"

  - name: "dnode0-data1"
    type: "100gbase-x-qsfp28"
    label: "DNode 0 – Data Port 1 (MCX545B-ECAN OCP)"
    description: "CX5 OCP NIC (100GbE or EDR IB)"

  - name: "dnode0-mgmt0"
    type: "1000base-t"
    label: "DNode 0 – Management 0"
    description: "Optional 1GbE management port 0"
    mgmt_only: true

  - name: "dnode0-mgmt1"
    type: "1000base-t"
    label: "DNode 0 – Management 1"
    description: "Optional 1GbE management port 1"
    mgmt_only: true

  # --- DNode 1 ---
  - name: "dnode1-data0"
    type: "100gbase-x-qsfp28"
    label: "DNode 1 – Data Port 0 (MCX555A-ECAT)"
    description: "CX5 Single Port NIC (100GbE or EDR IB)"

  - name: "dnode1-data1"
    type: "100gbase-x-qsfp28"
    label: "DNode 1 – Data Port 1 (MCX545B-ECAN OCP)"
    description: "CX5 OCP NIC (100GbE or EDR IB)"

  - name: "dnode1-mgmt0"
    type: "1000base-t"
    label: "DNode 1 – Management 0"
    description: "Optional 1GbE management port 0"
    mgmt_only: true

  - name: "dnode1-mgmt1"
    type: "1000base-t"
    label: "DNode 1 – Management 1"
    description: "Optional 1GbE management port 1"
    mgmt_only: true

# ------------------------------------------------------------
# Power Ports
# ------------------------------------------------------------
power-ports:
  - name: "PSU0"
    type: "iec-60320-c20"
    maximum_draw: 1500
    allocated_draw: 1500
    label: "Power Supply 0 (1500W 80+ Platinum)"

  - name: "PSU1"
    type: "iec-60320-c20"
    maximum_draw: 1500
    allocated_draw: 1500
    label: "Power Supply 1 (1500W 80+ Platinum)"

  - name: "PSU2"
    type: "iec-60320-c20"
    maximum_draw: 1500
    allocated_draw: 1500
    label: "Power Supply 2 (1500W 80+ Platinum)"

  - name: "PSU3"
    type: "iec-60320-c20"
    maximum_draw: 1500
    allocated_draw: 1500
    label: "Power Supply 3 (1500W 80+ Platinum)"

# ------------------------------------------------------------
# Module Bays — 2x DNode fabric modules
# ------------------------------------------------------------
module-bays:
  - name: "DNode 0"
    label: "Fabric Module / DNode 0"
    description: "Active/Active DNode fabric module – slot 0"
    position: "0"

  - name: "DNode 1"
    label: "Fabric Module / DNode 1"
    description: "Active/Active DNode fabric module – slot 1"
    position: "1"

