---
# NetBox Device Type Definition
# VAST Data DBox DF-3015V2 (Ceres V2)
# Source: DBox DF-3015V2/DF-3060V2 Ceres Datasheet
#
# NOTE: DF-3060V2 is the same chassis — higher capacity config.
#   DF-3015V2: 6.4TB Persistent Memory  | 338TB  HyperScale Flash
#   DF-3060V2: 12TB  Persistent Memory  | 1352TB HyperScale Flash
# Create a separate device type entry for DF-3060V2 if needed,
# or track capacity variant via a Custom Field on the Device.

manufacturer: VAST Data
model: DBox DF-3015V2
slug: vast-dbox-df-3015v2
part_number: DF-3015V2
u_height: 1
is_full_depth: true
subdevice_role: parent

# To add images: upload via NetBox UI > Device Types > Images
# Suggested filenames:
#   front_image: vast_dbox_ceres_v2_front.png
#   rear_image:  vast_dbox_ceres_v2_rear.png

comments: |
  VAST Data DBox DF-3015V2 (Ceres V2).
  1U storage chassis hosting 2x Active/Active Fabric Modules (DTrays).
  Persistent Memory: 6.4TB | HyperScale Flash: 338TB.
  (DF-3060V2 variant: 12TB PM / 1352TB Flash — same chassis.)
  Per DTray: 1x Nvidia BlueField-3 E-Series (NVIDIA P/N 900-9D3C6-00SV-DA0),
  16x Arm cores, 48GB DDR5 ECC, 2x 200GbE/NDR200 IB (QSFP112), 2x 1GbE mgmt.
  Chassis I/O: 4x 200GbE OR 4x HDR200 IB total (2 per DTray).
  Power: Idle 368W / Active 400-728W / Max 850W.

# ------------------------------------------------------------
# Interfaces — Per Chassis (2 DTrays, BF3 per tray)
# Each DTray has:
#   - 2x 200GbE / NDR200 IB (QSFP112) data ports
#   - 2x 1GbE management ports
#   - 1x USB-C management (per chassis rear)
# Total per chassis: 4x data + 4x mgmt + 1x USB-C
# ------------------------------------------------------------
interfaces:
  # --- DTray 1 (BF3 Canister #1) ---
  - name: "dtray1-port0"
    type: "200gbase-x-qsfp56"
    label: "DTray 1 – Port 0 (BF3 Canister #1)"
    description: "200GbE or NDR200 IB – QSFP112"

  - name: "dtray1-port1"
    type: "200gbase-x-qsfp56"
    label: "DTray 1 – Port 1 (BF3 Canister #1)"
    description: "200GbE or NDR200 IB – QSFP112"

  - name: "dtray1-lan0"
    type: "1000base-t"
    label: "DTray 1 – RJ45 LAN1 (VLAN70 Host+BMC)"
    description: "1GbE management – Host+BMC"
    mgmt_only: true

  - name: "dtray1-lan1"
    type: "1000base-t"
    label: "DTray 1 – RJ45 LAN2 (VLAN71 Host only)"
    description: "1GbE management – Host only"
    mgmt_only: true

  # --- DTray 2 (BF3 Canister #2) ---
  - name: "dtray2-port0"
    type: "200gbase-x-qsfp56"
    label: "DTray 2 – Port 0 (BF3 Canister #2)"
    description: "200GbE or NDR200 IB – QSFP112"

  - name: "dtray2-port1"
    type: "200gbase-x-qsfp56"
    label: "DTray 2 – Port 1 (BF3 Canister #2)"
    description: "200GbE or NDR200 IB – QSFP112"

  - name: "dtray2-lan0"
    type: "1000base-t"
    label: "DTray 2 – RJ45 LAN1 (VLAN70 Host+BMC)"
    description: "1GbE management – Host+BMC"
    mgmt_only: true

  - name: "dtray2-lan1"
    type: "1000base-t"
    label: "DTray 2 – RJ45 LAN2 (VLAN71 Host only)"
    description: "1GbE management – Host only"
    mgmt_only: true

  # --- Chassis USB-C management (rear) ---
  - name: "usb-c-mgmt"
    type: "other"
    label: "USB-C Management (Chassis Rear)"
    description: "USB-C management port on rear panel"
    mgmt_only: true

# ------------------------------------------------------------
# Power Ports — 2x redundant 1600W 80+ Platinum
# ------------------------------------------------------------
power-ports:
  - name: "PSU1"
    type: "iec-60320-c20"
    maximum_draw: 1600
    allocated_draw: 1600
    label: "Power Supply 1 (1600W 80+ Platinum)"

  - name: "PSU2"
    type: "iec-60320-c20"
    maximum_draw: 1600
    allocated_draw: 1600
    label: "Power Supply 2 (1600W 80+ Platinum)"

# ------------------------------------------------------------
# Module Bays — 2x DTray fabric modules (BF3 canisters)
# ------------------------------------------------------------
module-bays:
  - name: "DTray 1"
    label: "Fabric Module / DTray 1 (BF3 Canister #1)"
    description: "Active/Active DTray – Nvidia BlueField-3 – slot 1"
    position: "1"

  - name: "DTray 2"
    label: "Fabric Module / DTray 2 (BF3 Canister #2)"
    description: "Active/Active DTray – Nvidia BlueField-3 – slot 2"
    position: "2"

# ------------------------------------------------------------
