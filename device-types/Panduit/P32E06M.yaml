comments: |
  SmartZone G5 Monitored Switched PDU
  1-Phase, 32A, 230V, IEC 60309 2P+E 6h 30/32A (IP44) inlet
  24x C13 + 8x C19 outlets across 2 circuit breakers (B1: outlets 1-16, B2: outlets 17-32)
  C19 positions: 1, 8, 9, 16, 17, 24, 25, 32. All others C13.
  Per-outlet switching and monitoring. Includes RJ45 management port.
  NOTE: Do NOT set maximum_draw on the power port - this prevents NetBox from
  calculating downstream device draw propagation (NetBox issue #8177).

interfaces:
  - name: Management
    type: 1000base-t
    mgmt_only: true

power-ports:
