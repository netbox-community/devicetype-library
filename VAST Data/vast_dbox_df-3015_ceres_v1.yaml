---
# NetBox Device Type Definition
# VAST Data DBox DF-3015 (Ceres V1)
# Source: DBox DF-3015/DF-3060 Ceres Datasheet
#
# NOTE: DF-3060 is the same chassis — higher capacity config.
#   DF-3015: 6.4TB Persistent Memory  | 338TB  HyperScale Flash
#   DF-3060: 12TB  Persistent Memory  | 1352TB HyperScale Flash
# Create a separate device type entry for DF-3060 if needed,
# or track capacity variant via a Custom Field on the Device.

manufacturer: VAST Data
model: DBox DF-3015
slug: vast-dbox-df-3015
part_number: DF-3015
u_height: 1
is_full_depth: true
subdevice_role: parent

# To add images: upload via NetBox UI > Device Types > Images
# Suggested filenames:
#   front_image: vast_dbox_ceres_v1_front.png
#   rear_image:  vast_dbox_ceres_v1_rear.png

comments: |
  VAST Data DBox DF-3015 (Ceres V1).
  1U storage chassis hosting 2x Active/Active Fabric Modules (DTrays).
  Persistent Memory: 6.4TB | HyperScale Flash: 338TB.
  (DF-3060 variant: 12TB PM / 1352TB Flash — same chassis.)
  Per DTray: 2x Nvidia BlueField BF1600 (MBF1M606A-ESNAT), 16x Arm A72 cores,
  64GB DDR4, 4x 100GbE/EDR IB, 2x 1GbE mgmt.
  Chassis I/O: 8x 100GbE OR 8x EDR IB total (4 per DTray).

# ------------------------------------------------------------
# Interfaces — Per Chassis (2 DTrays, BF1600 per tray)
# Each DTray has:
#   - 4x 100GbE / 100Gb EDR IB data ports
#   - 2x 1GbE management ports
# Total per chassis: 8x data + 4x mgmt
# ------------------------------------------------------------
interfaces:
  # --- DTray 1 ---
  - name: "dtray1-data0"
    type: "100gbase-x-qsfp28"
    label: "DTray 1 – Data Port 0 (BF1600)"
    description: "100GbE or EDR IB"

  - name: "dtray1-data1"
    type: "100gbase-x-qsfp28"
    label: "DTray 1 – Data Port 1 (BF1600)"
    description: "100GbE or EDR IB"

  - name: "dtray1-data2"
    type: "100gbase-x-qsfp28"
    label: "DTray 1 – Data Port 2 (BF1600)"
    description: "100GbE or EDR IB"

  - name: "dtray1-data3"
    type: "100gbase-x-qsfp28"
    label: "DTray 1 – Data Port 3 (BF1600)"
    description: "100GbE or EDR IB"

  - name: "dtray1-mgmt0"
    type: "1000base-t"
    label: "DTray 1 – Management 0"
    description: "Optional 1GbE management port 0"
    mgmt_only: true

  - name: "dtray1-mgmt1"
    type: "1000base-t"
    label: "DTray 1 – Management 1"
    description: "Optional 1GbE management port 1"
    mgmt_only: true

  # --- DTray 2 ---
  - name: "dtray2-data0"
    type: "100gbase-x-qsfp28"
    label: "DTray 2 – Data Port 0 (BF1600)"
    description: "100GbE or EDR IB"

  - name: "dtray2-data1"
    type: "100gbase-x-qsfp28"
    label: "DTray 2 – Data Port 1 (BF1600)"
    description: "100GbE or EDR IB"

  - name: "dtray2-data2"
    type: "100gbase-x-qsfp28"
    label: "DTray 2 – Data Port 2 (BF1600)"
    description: "100GbE or EDR IB"

  - name: "dtray2-data3"
    type: "100gbase-x-qsfp28"
    label: "DTray 2 – Data Port 3 (BF1600)"
    description: "100GbE or EDR IB"

  - name: "dtray2-mgmt0"
    type: "1000base-t"
    label: "DTray 2 – Management 0"
    description: "Optional 1GbE management port 0"
    mgmt_only: true

  - name: "dtray2-mgmt1"
    type: "1000base-t"
    label: "DTray 2 – Management 1"
    description: "Optional 1GbE management port 1"
    mgmt_only: true

# ------------------------------------------------------------
# Power Ports — 2x redundant 1600W 80+ Platinum
# ------------------------------------------------------------
power-ports:
  - name: "PSU1"
    type: "iec-60320-c20"
    maximum_draw: 1600
    allocated_draw: 1600
    label: "Power Supply 1 (1600W 80+ Platinum)"

  - name: "PSU2"
    type: "iec-60320-c20"
    maximum_draw: 1600
    allocated_draw: 1600
    label: "Power Supply 2 (1600W 80+ Platinum)"

# ------------------------------------------------------------
# Module Bays — 2x DTray fabric modules
# ------------------------------------------------------------
module-bays:
  - name: "DTray 1"
    label: "Fabric Module / DTray 1"
    description: "Active/Active DTray fabric module – slot 1"
    position: "1"

  - name: "DTray 2"
    label: "Fabric Module / DTray 2"
    description: "Active/Active DTray fabric module – slot 2"
    position: "2"

# ------------------------------------------------------------
# Device Bays — 22x E1.L SSD + 8x U.2 SCM per chassis
