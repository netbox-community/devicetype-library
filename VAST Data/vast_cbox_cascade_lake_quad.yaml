---
# NetBox Device Type Definition
# VAST Data CBox 2U 4-Node Cascade Lake (QUAD-4N-CL)
# Source: CBOX 2U 4 node chassis - Cascade Lake Datasheet
# Manufacturer: Intel S9200WK platform
#
# NIC configurations:
#   QUAD-4N-CL-1NIC: 2x 100GbE/IB per CNode  (1 NIC)
#   QUAD-4N-CL-2NIC: 4x 100GbE/IB per CNode  (2 NICs)
# This YAML models the 2NIC (full) configuration.
# For 1NIC: remove cn*-data2 and cn*-data3 interfaces per node.

manufacturer: VAST Data
model: CBox Cascade Lake Quad
slug: vast-cbox-cascade-lake-quad
part_number: QUAD-4N-CL
u_height: 2
is_full_depth: true
subdevice_role: parent

# To add images: upload via NetBox UI > Device Types > Images
# Suggested filenames:
#   front_image: vast_cbox_cascade_lake_front.png
#   rear_image:  vast_cbox_cascade_lake_rear.png

comments: |
  VAST Data CBox 2U 4-Node Cascade Lake (QUAD-4N-CL).
  2U chassis hosting 4x CNodes (CN1–CN4) — Intel S9200WK platform.
  Per CNode: 32x CPU cores @ 2.1GHz (128 total), 8x 32GB DDR4-2400 RDIMM (1TB total).
  I/O per CNode: 2x 100GbE/IB (1NIC) or 4x 100GbE/IB (2NIC).
  Management per CNode: 4x 1GbE.
  Power: 2x 1600W shared chassis PSUs.
  Performance per CNode: Read 8.8GB/s / 42K IOPs, Write 2.3GB/s / 23.6K IOPs.

# ------------------------------------------------------------
# Interfaces — 4x CNodes, 2NIC config (4x 100GbE per node)
# Rear layout: CN4 (top-left), CN3 (top-right),
#              CN2 (bottom-left), CN1 (bottom-right)
# Each CNode has 2x QSFP28 data ports per NIC card
# ------------------------------------------------------------
interfaces:
  # --- CN1 ---
  - name: "cn1-data0"
    type: "100gbase-x-qsfp28"
    label: "CN1 – Data Port 0 (NIC1)"
    description: "100GbE or IB – NIC 1"
  - name: "cn1-data1"
    type: "100gbase-x-qsfp28"
    label: "CN1 – Data Port 1 (NIC1)"
    description: "100GbE or IB – NIC 1"
  - name: "cn1-data2"
    type: "100gbase-x-qsfp28"
    label: "CN1 – Data Port 2 (NIC2)"
    description: "100GbE or IB – NIC 2 (2NIC config only)"
  - name: "cn1-data3"
    type: "100gbase-x-qsfp28"
    label: "CN1 – Data Port 3 (NIC2)"
    description: "100GbE or IB – NIC 2 (2NIC config only)"
  - name: "cn1-mgmt0"
    type: "1000base-t"
    label: "CN1 – Management 0"
    mgmt_only: true
  - name: "cn1-mgmt1"
    type: "1000base-t"
    label: "CN1 – Management 1"
    mgmt_only: true
  - name: "cn1-mgmt2"
    type: "1000base-t"
    label: "CN1 – Management 2"
    mgmt_only: true
  - name: "cn1-mgmt3"
    type: "1000base-t"
    label: "CN1 – Management 3"
    mgmt_only: true

  # --- CN2 ---
  - name: "cn2-data0"
