    label: "CN2 – Data Port 0 (NIC1)"
    description: "100GbE or IB – NIC 1"
  - name: "cn2-data1"
    type: "100gbase-x-qsfp28"
    label: "CN2 – Data Port 1 (NIC1)"
    description: "100GbE or IB – NIC 1"
  - name: "cn2-data2"
    type: "100gbase-x-qsfp28"
    label: "CN2 – Data Port 2 (NIC2)"
    description: "100GbE or IB – NIC 2 (2NIC config only)"
  - name: "cn2-data3"
    type: "100gbase-x-qsfp28"
    label: "CN2 – Data Port 3 (NIC2)"
    description: "100GbE or IB – NIC 2 (2NIC config only)"
  - name: "cn2-mgmt0"
    type: "1000base-t"
    label: "CN2 – Management 0"
    mgmt_only: true
  - name: "cn2-mgmt1"
