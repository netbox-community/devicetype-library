  # --- CN3 ---
  - name: "cn3-data0"
    type: "100gbase-x-qsfp28"
    label: "CN3 – Data Port 0 (NIC1)"
    description: "100GbE or IB – NIC 1"
  - name: "cn3-data1"
    type: "100gbase-x-qsfp28"
