# ------------------------------------------------------------
# Power Ports — 2x shared 1600W chassis PSUs (centre rear)
# ------------------------------------------------------------
power-ports:
  - name: "PSU1"
    type: "iec-60320-c20"
    maximum_draw: 1600
    allocated_draw: 1600
    label: "Chassis PSU 1 (1600W)"

  - name: "PSU2"
    type: "iec-60320-c20"
    maximum_draw: 1600
    allocated_draw: 1600
    label: "Chassis PSU 2 (1600W)"

# ------------------------------------------------------------
# Module Bays — 4x CNode blades (CN1–CN4)
# Rear layout: CN4 top-left, CN3 top-right,
#              CN2 bottom-left, CN1 bottom-right
# ------------------------------------------------------------
module-bays:
  - name: "CN1"
    label: "CNode 1 (bottom-right)"
    description: "Cascade Lake CNode blade – CN1"
    position: "1"

  - name: "CN2"
    label: "CNode 2 (bottom-left)"
    description: "Cascade Lake CNode blade – CN2"
    position: "2"

  - name: "CN3"
    label: "CNode 3 (top-right)"
    description: "Cascade Lake CNode blade – CN3"
    position: "3"

  - name: "CN4"
    label: "CNode 4 (top-left)"
    description: "Cascade Lake CNode blade – CN4"
    position: "4"
