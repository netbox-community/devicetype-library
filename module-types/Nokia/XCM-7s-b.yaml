---
# Nokia 7750 SR-s XCM-7s-b (Extended Control Module, revision B)
# Combines CPM + SFM + IOM functions in a single module
# Goes in line card slots 1-6 of SR-7s
# Has 2 MDA half-slots + optional XIOM slot
manufacturer: Nokia
model: XCM-7s-b
part_number: 3HE16474AA
comments: >-
  XCM-7s-b (Extended Control Module, rev B) for 7750 SR-7s.
  CLI: xcm-7s-b. Combines control, fabric, and I/O functions.
  Hosts 2 MDA-s half-slots and 1 XIOM slot.
module-bays:
  - name: '{module}/1'
    position: '1'
    label: MDA 1
  - name: '{module}/2'
    position: '2'
    label: MDA 2
  - name: '{module}/x1'
    position: x1
    label: XIOM
