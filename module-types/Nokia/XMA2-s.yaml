---
# Nokia XMA2-s (eXtended Media Adapter 2 for SR-s)
# Installs in XIOM slot of XCM2-7s/14s cards
# Integrated module - mda-type m36-800g-qsfpdd is auto-configured
# xiom-type in SROS config: x2-s36-800g-qsfpdd-6.0t
manufacturer: Nokia
model: XMA2-s
part_number: 3HE18883AA
comments: >-
  XMA2-s 36-port 800GE QSFP-DD for 7750 SR-7s/14s XCM2 series. FP5 silicon.
  Installs in XIOM slot of XCM2-7s/14s. SROS xiom-type: x2-s36-800g-qsfpdd-6.0t.
  mda-type m36-800g-qsfpdd is automatically configured; the XMA2-s is an integrated
  unit (same PN and serial for both XIOM and MDA CLI views).
module-bays:
  - name: '{module}/c1'
    position: c1
    label: QSFP-DD
