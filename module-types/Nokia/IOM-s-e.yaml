---
# Nokia 7750 SR-s IOM-s-e (Input/Output Module, enhanced)
# FP4-based, up to 3.6 Tb/s per slot
# Goes in line card slots 1-6 of SR-7s/14s
# Has 2 MDA half-slots + optional XIOM slot
manufacturer: Nokia
model: IOM-s-e
part_number: 3HE16474AA
comments: >-
  IOM-s-e (Input/Output Module, enhanced) for 7750 SR-7s/14s.
  FP4 silicon, up to 3.6 Tb/s full duplex. Hosts 2 MDA-s half-slots
  and 1 XIOM slot.
module-bays:
  - name: '{module}/1'
    position: '1'
    label: MDA 1
  - name: '{module}/2'
    position: '2'
    label: MDA 2
  - name: '{module}/x1'
    position: x1
    label: XIOM
